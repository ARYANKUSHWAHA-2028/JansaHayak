<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">Create Account</h2>

        {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Username</label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button class="btn btn-primary">

                Sign Up

            </button>

        </form>

    </div>

</div>

</body>
</html>
